name: billdesk
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  uuid: ^4.5.3
  pdf: ^3.12.0
  printing: ^5.14.3
  intl: ^0.20.2
  fl_chart: ^1.2.0
  sqflite_common_ffi: ^2.3.7+1
  shared_preferences: ^2.5.5
  crypto: ^3.0.7
  local_auth: ^3.0.1
  flutter_localizations:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Aharoni.ttf
    - assets/fonts/CopperplateGothicBold.ttf
    - assets/fonts/BookmanOldStyle.ttf
    - assets/fonts/BookmanOldStyleBold.ttf
    - assets/images/icon.png
